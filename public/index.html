<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sube tu foto - Nuestra Boda</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #5d4037; font-size: 24px; }
        p { color: #777; margin-bottom: 25px; }
        
        /* Estilo del botón de archivo */
        input[type="file"] {
            margin-bottom: 20px;
            width: 100%;
        }

        /* Botón de envío */
        .btn-enviar {
            background-color: #8d6e63;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-enviar:hover {
            background-color: #5d4037;
        }
        .link-galeria {
            margin-top: 20px;
            display: block;
            color: #8d6e63;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>📸 ¡Comparte tu foto!</h1>
        <p>Ayúdanos a guardar los mejores recuerdos de este día especial.</p>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="foto" accept="image/*" capture="camera" required>
            <br>
            <button type="submit" class="btn-enviar">Subir Foto</button>
        </form>

        <a href="/galeria.html" class="link-galeria">Ver Galería →</a>
    </div>

</body>
</html>
